<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小五語文魔法學院</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdfa;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .pop-in {
            animation: pop-in 0.3s ease-out forwards;
        }
        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 詞語數據庫 ---
        const vocabData = [
            { word: "誠懇", definition: "態度真誠懇切。", sentence: "他待人真誠，大家都覺得他很___。", emoji: "🤝", parts: [["言", "成"], ["艮", "心"]] },
            { word: "領會", definition: "了解、明白其中的道理或意思。", sentence: "經過老師的講解，我終於___了這首詩的意思。", emoji: "💡", parts: [["令", "頁"], ["人", "云"]] },
            { word: "說服", definition: "用充分的理由使人信服。", sentence: "哥哥用充分的理由___了爸爸讓他去露營。", emoji: "🗣️", parts: [["言", "兌"], ["月", "艮"]] },
            { word: "見解", definition: "對事物的認識和看法。", sentence: "大家對這件事有不同的___，需要開會討論。", emoji: "💭", parts: [["目", "儿"], ["角", "刀"]] },
            { word: "接納", definition: "接受、採納。", sentence: "我們應該保持開放的心態，___別人的意見。", emoji: "👐", parts: [["扌", "妾"], ["糸", "內"]] },
            { word: "時機", definition: "做某件事的適當時候。", sentence: "我們必須把握___，努力學習，不要浪費光陰。", emoji: "⏱️", parts: [["日", "寺"], ["木", "幾"]] },
            { word: "預期", definition: "事前估計或期望。", sentence: "這次考試的成績比我___的還要好，我感到很驚喜。", emoji: "📈", parts: [["予", "頁"], ["其", "月"]] },
            { word: "主張", definition: "對事物持有的見解或提議。", sentence: "校長___每天做運動，以保持身體健康。", emoji: "🙋‍♂️", parts: [["丶", "王"], ["弓", "長"]] },
            { word: "具備", definition: "具有、擁有（多指精神、條件等）。", sentence: "要成為一名好醫生，必須___專業的醫學知識。", emoji: "🎒", parts: [["目", "八"], ["亻", "田"]] },
            { word: "實行", definition: "實際去做。", sentence: "學校下個月將___新的環保政策，鼓勵回收。", emoji: "🏃‍♂️", parts: [["宀", "貫"], ["彳", "亍"]] },
            { word: "揣摩", definition: "反覆思考、推敲。", sentence: "演員需要仔細___角色的心理，才能演得逼真。", emoji: "🤔", parts: [["扌", "耑"], ["手", "麻"]] },
            { word: "反抗", definition: "用行動反對或抵抗。", sentence: "面對不公平的對待，我們應該勇敢地___。", emoji: "🛡️", parts: [["厂", "又"], ["扌", "亢"]] }
        ];

        // 實用函數：打亂陣列
        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

        // --- 主應用程式組件 ---
        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [scores, setScores] = useState({ game1: 0, game2: 0, game3: 0, game4: 0, game5: 0 });
            const [progress, setProgress] = useState({ game1: false, game2: false, game3: false, game4: false, game5: false });

            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const completedCount = Object.values(progress).filter(Boolean).length;

            const handleGameComplete = (gameId, score) => {
                setScores(prev => ({ ...prev, [gameId]: Math.max(prev[gameId], score) })); // 保留最高分
                setProgress(prev => ({ ...prev, [gameId]: true }));
            };

            const renderView = () => {
                switch(currentView) {
                    case 'game1': return <Game1 vocab={vocabData} onBack={() => setCurrentView('home')} onComplete={(score) => handleGameComplete('game1', score)} />;
                    case 'game2': return <Game2 vocab={vocabData} onBack={() => setCurrentView('home')} onComplete={(score) => handleGameComplete('game2', score)} />;
                    case 'game3': return <Game3 vocab={vocabData} onBack={() => setCurrentView('home')} onComplete={(score) => handleGameComplete('game3', score)} />;
                    case 'game4': return <Game4 vocab={vocabData} onBack={() => setCurrentView('home')} onComplete={(score) => handleGameComplete('game4', score)} />;
                    case 'game5': return <Game5 vocab={vocabData} onBack={() => setCurrentView('home')} onComplete={(score) => handleGameComplete('game5', score)} />;
                    default: return <Home />;
                }
            };

            // 首頁組件
            const Home = () => (
                <div className="max-w-4xl mx-auto p-4 sm:p-6 pb-20">
                    <header className="text-center mb-10 pop-in mt-6">
                        <h1 className="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-4 drop-shadow-sm">
                            ✨ 小五語文魔法學院 ✨
                        </h1>
                        <p className="text-lg text-gray-600 font-bold">挑戰五大關卡，成為詞語大師！</p>
                    </header>

                    {/* 進度與分數面版 */}
                    <div className="bg-white rounded-3xl p-6 shadow-xl mb-8 flex flex-col sm:flex-row justify-between items-center border-4 border-blue-100">
                        <div className="flex items-center mb-4 sm:mb-0">
                            <div className="bg-yellow-100 p-4 rounded-full mr-4 shadow-inner">
                                <span className="text-4xl">🏆</span>
                            </div>
                            <div>
                                <p className="text-sm text-gray-500 font-bold">魔法總分</p>
                                <p className="text-4xl font-black text-yellow-500">{totalScore}</p>
                            </div>
                        </div>
                        <div className="w-full sm:w-1/2">
                            <div className="flex justify-between mb-2">
                                <span className="font-bold text-blue-700">挑戰進度</span>
                                <span className="font-bold text-blue-700">{completedCount} / 5</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-4 shadow-inner">
                                <div className="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full transition-all duration-500 ease-out" 
                                     style={{ width: `${(completedCount / 5) * 100}%` }}></div>
                            </div>
                        </div>
                    </div>

                    {/* 遊戲列表 */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <GameCard id="game1" title="詞義配對大師" icon="🧩" color="bg-pink-100 border-pink-300" textColor="text-pink-700" desc="找出詞語正確的解釋" />
                        <GameCard id="game2" title="魔法過河填充" icon="🌉" color="bg-blue-100 border-blue-300" textColor="text-blue-700" desc="把正確的詞語填入句子中" />
                        <GameCard id="game3" title="漢字煉金術" icon="🔮" color="bg-purple-100 border-purple-300" textColor="text-purple-700" desc="把部首拼湊成完整的字" />
                        <GameCard id="game4" title="情境推理探長" icon="🕵️‍♂️" color="bg-green-100 border-green-300" textColor="text-green-700" desc="看圖及情境選出適合的詞語" />
                        <GameCard id="game5" title="極速挑戰賽" icon="⚡" color="bg-yellow-100 border-yellow-300" textColor="text-yellow-700" desc="限時60秒綜合大考驗！" />
                    </div>
                </div>
            );

            const GameCard = ({ id, title, icon, color, textColor, desc }) => (
                <div 
                    onClick={() => setCurrentView(id)}
                    className={`cursor-pointer transform hover:scale-105 transition-transform duration-200 rounded-3xl p-6 border-4 shadow-lg ${color} flex flex-col items-center text-center relative overflow-hidden`}
                >
                    {progress[id] && (
                        <div className="absolute top-2 right-2 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-full flex items-center shadow">
                            ✔️ 已完成
                        </div>
                    )}
                    <div className="text-6xl mb-4 float">{icon}</div>
                    <h2 className={`text-2xl font-black mb-2 ${textColor}`}>{title}</h2>
                    <p className="text-gray-600 font-bold mb-4">{desc}</p>
                    <div className="mt-auto bg-white/60 px-4 py-2 rounded-xl font-bold w-full">
                        最高分: <span className={textColor}>{scores[id]}</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {renderView()}
                </div>
            );
        }

        // ==========================================
        // 遊戲一：詞義配對大師
        // ==========================================
        const Game1 = ({ vocab, onBack, onComplete }) => {
            const [words, setWords] = useState([]);
            const [defs, setDefs] = useState([]);
            const [selectedWord, setSelectedWord] = useState(null);
            const [selectedDef, setSelectedDef] = useState(null);
            const [matched, setMatched] = useState([]);
            const [score, setScore] = useState(0);
            const [errorMsg, setErrorMsg] = useState("");
            
            // 初始化關卡 (選5個詞)
            useEffect(() => {
                const roundVocab = shuffleArray(vocab).slice(0, 5);
                setWords(shuffleArray(roundVocab.map(v => v.word)));
                setDefs(shuffleArray(roundVocab.map(v => ({ text: v.definition, word: v.word }))));
            }, []);

            useEffect(() => {
                if (selectedWord && selectedDef) {
                    if (selectedWord === selectedDef.word) {
                        // 匹配成功
                        setMatched([...matched, selectedWord]);
                        setScore(s => s + 20);
                        setSelectedWord(null);
                        setSelectedDef(null);
                        setErrorMsg("");
                    } else {
                        // 匹配失敗
                        setErrorMsg("哎呀！配對錯誤，再試試看！");
                        setSelectedWord(null);
                        setTimeout(() => {
                            setSelectedDef(null);
                            setErrorMsg("");
                        }, 800);
                    }
                }
            }, [selectedWord, selectedDef]);

            if (matched.length === 5) {
                return <GameOver score={score} maxScore={100} onBack={onBack} onComplete={() => onComplete(score)} title="詞義配對大師" />;
            }

            return (
                <GameLayout title="詞義配對大師" onBack={onBack} score={score}>
                    <p className="text-center font-bold text-gray-600 mb-6 text-lg">點擊左邊的詞語，再點擊右邊正確的解釋。</p>
                    {errorMsg && <p className="text-center text-red-500 font-bold mb-4 animate-bounce">{errorMsg}</p>}
                    
                    <div className="flex flex-col sm:flex-row gap-6 justify-center">
                        {/* 左側：詞語 */}
                        <div className="flex flex-col gap-4 w-full sm:w-1/3">
                            {words.map(w => (
                                <button 
                                    key={w}
                                    disabled={matched.includes(w)}
                                    onClick={() => setSelectedWord(w)}
                                    className={`p-4 rounded-2xl font-black text-xl border-4 transition-all shadow-md
                                        ${matched.includes(w) ? 'bg-gray-200 border-gray-300 text-gray-400 opacity-50' : 
                                          selectedWord === w ? 'bg-pink-400 border-pink-600 text-white scale-105' : 
                                          'bg-white border-pink-300 text-pink-700 hover:bg-pink-50'}`}
                                >
                                    {w}
                                </button>
                            ))}
                        </div>
                        {/* 右側：解釋 */}
                        <div className="flex flex-col gap-4 w-full sm:w-2/3">
                            {defs.map((d, i) => (
                                <button 
                                    key={i}
                                    disabled={matched.includes(d.word)}
                                    onClick={() => setSelectedDef(d)}
                                    className={`p-4 rounded-2xl font-bold text-lg border-4 transition-all text-left shadow-md
                                        ${matched.includes(d.word) ? 'bg-gray-200 border-gray-300 text-gray-400 opacity-50' : 
                                          selectedDef === d ? 'bg-blue-400 border-blue-600 text-white scale-105' : 
                                          'bg-white border-blue-300 text-blue-800 hover:bg-blue-50'}`}
                                >
                                    {d.text}
                                </button>
                            ))}
                        </div>
                    </div>
                </GameLayout>
            );
        };

        // ==========================================
        // 遊戲二：魔法過河填充
        // ==========================================
        const Game2 = ({ vocab, onBack, onComplete }) => {
            const [questions, setQuestions] = useState([]);
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);
            const [shake, setShake] = useState(false);

            useEffect(() => {
                const roundVocab = shuffleArray(vocab).slice(0, 5);
                const q = roundVocab.map(v => {
                    const wrongOptions = shuffleArray(vocab.filter(x => x.word !== v.word)).slice(0, 3).map(x => x.word);
                    return {
                        ...v,
                        options: shuffleArray([v.word, ...wrongOptions])
                    };
                });
                setQuestions(q);
            }, []);

            const handleAnswer = (ans) => {
                if(showResult) return;
                
                const correct = ans === questions[currentQ].word;
                setIsCorrect(correct);
                setShowResult(true);
                
                if (correct) {
                    setScore(s => s + 20);
                } else {
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }

                setTimeout(() => {
                    setShowResult(false);
                    setCurrentQ(c => c + 1);
                }, 1500);
            };

            if (questions.length === 0) return <div>Loading...</div>;
            if (currentQ >= questions.length) {
                return <GameOver score={score} maxScore={100} onBack={onBack} onComplete={() => onComplete(score)} title="魔法過河填充" />;
            }

            const q = questions[currentQ];

            return (
                <GameLayout title="魔法過河填充" onBack={onBack} score={score}>
                    <div className="flex justify-between items-center mb-6 font-bold text-blue-600">
                        <span>進度: {currentQ + 1} / 5</span>
                    </div>
                    
                    <div className={`bg-white rounded-3xl p-8 shadow-xl border-4 border-blue-200 mb-8 text-center ${shake ? 'shake' : 'pop-in'}`}>
                        <div className="text-6xl mb-4">🌉</div>
                        <h3 className="text-2xl font-black text-gray-800 leading-relaxed mb-6">
                            {q.sentence.split('___')[0]}
                            <span className="inline-block px-4 py-1 mx-2 border-b-4 border-dashed border-blue-500 text-blue-600 min-w-[80px]">
                                {showResult && isCorrect ? q.word : (showResult ? '❌' : '___')}
                            </span>
                            {q.sentence.split('___')[1]}
                        </h3>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        {q.options.map((opt, i) => (
                            <button 
                                key={i}
                                onClick={() => handleAnswer(opt)}
                                disabled={showResult}
                                className={`py-4 rounded-2xl font-black text-xl border-b-8 shadow-md transition-transform
                                    ${showResult && opt === q.word ? 'bg-green-400 border-green-600 text-white' : 
                                      showResult && !isCorrect ? 'bg-gray-300 border-gray-400 text-gray-500' :
                                      'bg-yellow-300 border-yellow-500 text-yellow-900 hover:bg-yellow-200 hover:-translate-y-1 active:translate-y-1 active:border-b-4'}`}
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                </GameLayout>
            );
        };

        // ==========================================
        // 遊戲三：漢字煉金術 (部首/拆字拼圖)
        // ==========================================
        const Game3 = ({ vocab, onBack, onComplete }) => {
            const [targetWords, setTargetWords] = useState([]);
            const [partsList, setPartsList] = useState([]);
            const [selectedPart, setSelectedPart] = useState(null);
            const [score, setScore] = useState(0);
            const [assembledWords, setAssembledWords] = useState([]); // [ { charIndex, part1, part2 } ]

            useEffect(() => {
                // 挑選出5個字來玩拆字
                const charsToPlay = [];
                const words = shuffleArray(vocab).slice(0, 5); // 隨機5個詞
                
                words.forEach(v => {
                    // 為了簡單，每個詞我們挑選其中一個字來玩拼圖 (v.parts[0] 或 v.parts[1])
                    // 這裡預先在數據庫定義了，我們取第一個字
                    if(v.parts && v.parts[0]){
                        charsToPlay.push({
                            fullChar: v.word[0], // 例如「誠」
                            part1: v.parts[0][0], // 言
                            part2: v.parts[0][1], // 成
                            word: v.word
                        });
                    }
                });
                
                setTargetWords(charsToPlay);
                
                // 準備散落的部件
                let allParts = [];
                charsToPlay.forEach(item => {
                    allParts.push({ id: Math.random(), text: item.part1, belongsTo: item.fullChar, isLeft: true });
                    allParts.push({ id: Math.random(), text: item.part2, belongsTo: item.fullChar, isLeft: false });
                });
                setPartsList(shuffleArray(allParts));
            }, []);

            const handlePartClick = (part) => {
                if(!selectedPart) {
                    setSelectedPart(part);
                } else {
                    // 檢查是否配對成功 (屬於同一個字，且不是同一個碎片)
                    if(selectedPart.belongsTo === part.belongsTo && selectedPart.id !== part.id) {
                        // 成功
                        setScore(s => s + 20);
                        setAssembledWords([...assembledWords, part.belongsTo]);
                        setPartsList(partsList.filter(p => p.belongsTo !== part.belongsTo));
                        setSelectedPart(null);
                    } else {
                        // 失敗
                        setSelectedPart(null);
                    }
                }
            };

            if (assembledWords.length === 5 || (targetWords.length > 0 && assembledWords.length === targetWords.length)) {
                return <GameOver score={score} maxScore={targetWords.length * 20} onBack={onBack} onComplete={() => onComplete(score)} title="漢字煉金術" />;
            }

            return (
                <GameLayout title="漢字煉金術" onBack={onBack} score={score}>
                    <p className="text-center font-bold text-purple-700 mb-6 text-lg">點選兩個正確的部件，將它們合成一個完整的漢字！</p>
                    
                    {/* 合成台 */}
                    <div className="bg-purple-100 rounded-3xl p-6 mb-8 border-4 border-purple-300 flex justify-center gap-4 flex-wrap min-h-[120px]">
                        {assembledWords.length === 0 && <p className="text-purple-400 font-bold mt-4">已合成的字會出現在這裡</p>}
                        {assembledWords.map(char => (
                            <div key={char} className="w-16 h-16 bg-gradient-to-br from-yellow-300 to-yellow-500 rounded-xl flex items-center justify-center text-3xl font-black text-white shadow-lg border-2 border-yellow-200 pop-in">
                                {char}
                            </div>
                        ))}
                    </div>

                    {/* 散落的部件 */}
                    <div className="grid grid-cols-4 sm:grid-cols-5 gap-3 sm:gap-4">
                        {partsList.map((part) => (
                            <button
                                key={part.id}
                                onClick={() => handlePartClick(part)}
                                className={`aspect-square rounded-2xl text-2xl sm:text-3xl font-black shadow-md transition-all border-b-4
                                    ${selectedPart && selectedPart.id === part.id 
                                        ? 'bg-purple-500 border-purple-700 text-white scale-110' 
                                        : 'bg-white border-gray-300 text-gray-700 hover:bg-purple-50 hover:-translate-y-1'}`}
                            >
                                {part.text}
                            </button>
                        ))}
                    </div>
                </GameLayout>
            );
        };

        // ==========================================
        // 遊戲四：情境推理探長
        // ==========================================
        const Game4 = ({ vocab, onBack, onComplete }) => {
            const [questions, setQuestions] = useState([]);
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);

            useEffect(() => {
                const roundVocab = shuffleArray(vocab).slice(0, 5);
                const q = roundVocab.map(v => {
                    const wrongOptions = shuffleArray(vocab.filter(x => x.word !== v.word)).slice(0, 2).map(x => x.word);
                    return {
                        ...v,
                        options: shuffleArray([v.word, ...wrongOptions])
                    };
                });
                setQuestions(q);
            }, []);

            const handleAnswer = (ans) => {
                if (ans === questions[currentQ].word) {
                    setScore(s => s + 20);
                }
                setCurrentQ(c => c + 1);
            };

            if (questions.length === 0) return <div>Loading...</div>;
            if (currentQ >= questions.length) {
                return <GameOver score={score} maxScore={100} onBack={onBack} onComplete={() => onComplete(score)} title="情境推理探長" />;
            }

            const q = questions[currentQ];

            return (
                <GameLayout title="情境推理探長" onBack={onBack} score={score}>
                    <div className="text-center mb-8 pop-in">
                        <div className="text-8xl mb-4">{q.emoji}</div>
                        <div className="bg-green-100 p-6 rounded-3xl border-4 border-green-300 shadow-md inline-block max-w-xl">
                            <p className="text-2xl font-black text-green-800">「{q.definition}」</p>
                            <p className="text-gray-600 font-bold mt-2">這情境最適合哪一個詞語？</p>
                        </div>
                    </div>

                    <div className="flex flex-col gap-4 max-w-md mx-auto">
                        {q.options.map((opt, i) => (
                            <button 
                                key={i}
                                onClick={() => handleAnswer(opt)}
                                className="py-4 rounded-full bg-white border-4 border-green-400 text-green-700 font-black text-2xl shadow-sm hover:bg-green-500 hover:text-white hover:border-green-600 transition-colors"
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                </GameLayout>
            );
        };

        // ==========================================
        // 遊戲五：極速挑戰賽
        // ==========================================
        const Game5 = ({ vocab, onBack, onComplete }) => {
            const [timeLeft, setTimeLeft] = useState(60);
            const [score, setScore] = useState(0);
            const [currentQ, setCurrentQ] = useState(null);
            const [isActive, setIsActive] = useState(false);

            const generateQuestion = () => {
                const isSentence = Math.random() > 0.5;
                const target = vocab[Math.floor(Math.random() * vocab.length)];
                const wrongOptions = shuffleArray(vocab.filter(x => x.word !== target.word)).slice(0, 3).map(x => x.word);
                
                setCurrentQ({
                    questionText: isSentence ? target.sentence.replace(target.word, '___') : target.definition,
                    type: isSentence ? "填空" : "詞義",
                    answer: target.word,
                    options: shuffleArray([target.word, ...wrongOptions])
                });
            };

            useEffect(() => {
                if(!isActive) return;
                if (timeLeft === 0) {
                    setIsActive(false);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, isActive]);

            const startGame = () => {
                setIsActive(true);
                setScore(0);
                setTimeLeft(60);
                generateQuestion();
            };

            const handleAnswer = (ans) => {
                if (ans === currentQ.answer) {
                    setScore(s => s + 10);
                }
                generateQuestion();
            };

            if (!isActive && timeLeft === 60) {
                return (
                    <GameLayout title="極速挑戰賽" onBack={onBack} score={0}>
                        <div className="text-center mt-10">
                            <div className="text-7xl mb-6 float">⚡</div>
                            <h2 className="text-3xl font-black text-yellow-700 mb-4">準備好接受終極考驗了嗎？</h2>
                            <p className="text-lg font-bold text-gray-600 mb-8">限時 60 秒，回答越多，分數越高！<br/>(每題10分)</p>
                            <button onClick={startGame} className="bg-gradient-to-r from-red-500 to-yellow-500 text-white font-black text-3xl py-4 px-12 rounded-full shadow-xl hover:scale-105 transition-transform border-b-8 border-red-700 active:border-b-0 active:translate-y-2">
                                開始挑戰！
                            </button>
                        </div>
                    </GameLayout>
                );
            }

            if (timeLeft === 0) {
                return <GameOver score={score} maxScore={"無上限"} onBack={onBack} onComplete={() => onComplete(score)} title="極速挑戰賽" message="時間到！你的反應真快！" />;
            }

            return (
                <GameLayout title="極速挑戰賽" onBack={onBack} score={score}>
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center space-x-2">
                            <span className="text-2xl animate-pulse">⏳</span>
                            <span className={`text-3xl font-black ${timeLeft <= 10 ? 'text-red-600' : 'text-blue-800'}`}>
                                {timeLeft} 秒
                            </span>
                        </div>
                    </div>

                    {currentQ && (
                        <div className="bg-white rounded-3xl p-6 shadow-lg border-4 border-yellow-300 mb-6 min-h-[150px] flex flex-col justify-center">
                            <span className="bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-full text-sm self-start mb-2">
                                題型: {currentQ.type}
                            </span>
                            <h3 className="text-2xl font-black text-gray-800 text-center leading-relaxed">
                                {currentQ.questionText}
                            </h3>
                        </div>
                    )}

                    <div className="grid grid-cols-2 gap-4">
                        {currentQ && currentQ.options.map((opt, i) => (
                            <button 
                                key={i}
                                onClick={() => handleAnswer(opt)}
                                className="py-5 rounded-2xl bg-blue-500 text-white font-black text-2xl shadow-md hover:bg-blue-600 hover:-translate-y-1 active:translate-y-1 border-b-8 border-blue-700 active:border-b-4 transition-all"
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                </GameLayout>
            );
        };

        // ==========================================
        // 共用 UI 組件
        // ==========================================
        const GameLayout = ({ title, score, onBack, children }) => (
            <div className="max-w-4xl mx-auto p-4 sm:p-6 h-screen flex flex-col">
                <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border-2 border-gray-100">
                    <button onClick={onBack} className="text-gray-500 hover:text-blue-600 flex items-center font-bold">
                        <span className="text-2xl mr-1">🔙</span> 返回
                    </button>
                    <h1 className="text-2xl font-black text-gray-800">{title}</h1>
                    <div className="bg-yellow-100 px-4 py-2 rounded-full font-black text-yellow-600 border-2 border-yellow-300">
                        分數: {score}
                    </div>
                </header>
                <div className="flex-grow">
                    {children}
                </div>
            </div>
        );

        const GameOver = ({ score, maxScore, onBack, onComplete, title, message = "太棒了！關卡完成！" }) => {
            useEffect(() => {
                // 進入結算畫面時自動記錄分數
                onComplete();
            }, []);

            return (
                <div className="max-w-4xl mx-auto p-6 h-screen flex flex-col items-center justify-center">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl text-center border-8 border-yellow-300 pop-in max-w-lg w-full">
                        <div className="text-8xl mb-6 float">🎉</div>
                        <h2 className="text-4xl font-black text-gray-800 mb-2">{message}</h2>
                        <p className="text-xl text-gray-500 font-bold mb-8">({title})</p>
                        
                        <div className="bg-yellow-50 rounded-3xl p-6 mb-8 border-4 border-yellow-100">
                            <p className="text-gray-600 font-bold mb-2">獲得分數</p>
                            <p className="text-6xl font-black text-yellow-500">{score} <span className="text-2xl text-gray-400">/ {maxScore}</span></p>
                        </div>

                        <button 
                            onClick={onBack}
                            className="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-black text-2xl py-4 rounded-full shadow-lg hover:opacity-90 transform hover:scale-105 transition-all"
                        >
                            回到學院首頁
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
